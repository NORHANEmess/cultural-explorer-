<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Cultural Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div>
    <!-- Topbar -->
    <nav class="topbar">
      <div class="logo-def"> Cultural Explorer</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="book.html" class="book-now-btn">Book</a></li>
      </ul>
    </nav>
  </div>
  <header class="hero">
    <div class="login-container">
      <h1>Welcome Back</h1>
      <form id="login-form">
        <label for="email">Email Address:</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Enter your password" required>

        <button type="submit" class="btn">Login</button>
      </form>
      <p>Don't have an account? <a href="sign.html">Sign up here</a>.</p>
    </div>
  </header>
  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Check if user exists in LocalStorage
      const users = JSON.parse(localStorage.getItem('cultural_users')) || [];
      const user = users.find(user => user.email === email && user.password === password);

      if (user) {
        alert('Login successful! Welcome back!');
        // Redirect to home page or dashboard
        window.location.href = 'index.html';
      } else {
        alert('Invalid email or password. Please try again.');
      }
    });
  </script>
</body>
</html>
